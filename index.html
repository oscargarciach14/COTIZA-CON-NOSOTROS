<html lang="es">
<head>

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&family=Roboto:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      /* Paleta inspirada en mueblesydisenos.com.co (modo oscuro) */
      --bg: #000000;
      --surface: #0f0f0f;
      --ink: #ffffff;
      --muted: #abb8c3;
      --accent: #cf2e2e; /* rojo (marca) */
      --line: rgba(255, 255, 255, 0.14);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Roboto", system-ui, sans-serif;
      background:
        radial-gradient(900px circle at 50% -10%, rgba(207, 46, 46, 0.18), transparent 55%),
        radial-gradient(700px circle at 10% 10%, rgba(255, 255, 255, 0.05), transparent 50%),
        var(--bg);
      color: var(--ink);
      min-height: 100vh;
      line-height: 1.5;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: clamp(2rem, 5vw, 4rem) clamp(1.25rem, 4vw, 2rem) 3rem;
    }

    .topbar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 1.8rem;
    }

    .brand-logo {
      height: clamp(34px, 5vw, 52px);
      width: auto;
      display: block;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.04);
    }

    h1 {
      font-size: clamp(2.15rem, 5.2vw, 3.05rem);
      font-weight: 700;
      letter-spacing: 0.09em;
      text-align: center;
      text-transform: uppercase;
      color: transparent;
      font-family: "Montserrat", system-ui, sans-serif;
      background: linear-gradient(90deg, #ffffff 0%, rgba(255, 255, 255, 0.78) 45%, #ffffff 100%);
      -webkit-background-clip: text;
      background-clip: text;
      margin-bottom: clamp(2.5rem, 6vw, 4rem);
      text-shadow: 0 22px 65px rgba(0, 0, 0, 0.6);
    }

    h1::after {
      content: "";
      display: block;
      width: min(520px, 78%);
      height: 2px;
      margin: 1.25rem auto 0;
      background: linear-gradient(90deg, transparent, rgba(207, 46, 46, 0.85), transparent);
      border-radius: 999px;
      box-shadow: 0 0 0 1px rgba(207, 46, 46, 0.12);
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: clamp(0.75rem, 2vw, 1.25rem);
      margin-bottom: clamp(3rem, 8vw, 5rem);
    }

    @media (min-width: 720px) {
      .gallery {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .gallery a {
      text-decoration: none;
      color: #fff;
      position: relative;
      display: block;
      border: 1px solid var(--line);
      overflow: hidden;
      aspect-ratio: 4 / 3;
      background: var(--surface);
    }

    .gallery figure {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .gallery img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: grayscale(18%) contrast(1.05) brightness(0.88);
      transition: filter 0.35s ease, transform 0.35s ease;
    }

    .gallery a:hover img {
      filter: grayscale(0%) contrast(1.02) brightness(0.98);
      transform: scale(1.03);
    }

    .gallery figcaption {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 0.8rem 0.9rem;
      font-family: "Montserrat", system-ui, sans-serif;
      font-size: 0.86rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: linear-gradient(180deg, transparent 0%, rgba(0, 0, 0, 0.75) 75%);
    }

    .category {
      margin-bottom: 2.5rem;
      scroll-margin-top: 1rem;
      display: none;
    }

    .category.active {
      display: block;
    }

    .category h2 {
      font-family: "Montserrat", system-ui, sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 1rem;
      color: #ffffff;
      margin-bottom: 0.9rem;
    }

    .category-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.8rem;
    }

    @media (min-width: 760px) {
      .category-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .category-grid img {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      border: 1px solid var(--line);
      filter: grayscale(12%) contrast(1.03) brightness(0.9);
    }

    .hint {
      margin: -2.1rem 0 2.2rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.92rem;
      letter-spacing: 0.03em;
    }

    .cta {
      text-align: center;
      padding-top: 1.25rem;
      border-top: 1px solid var(--line);
    }

    .cta a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 1rem 2.15rem;
      font-size: 0.96rem;
      font-weight: 650;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
      font-family: "Montserrat", system-ui, sans-serif;
      color: #ffffff;
      background: var(--accent);
      border: 1px solid rgba(207, 46, 46, 0.65);
      border-radius: 999px;
      box-shadow:
        0 16px 45px rgba(207, 46, 46, 0.18),
        0 2px 0 rgba(255, 255, 255, 0.08) inset;
      transition: transform 0.18s ease, filter 0.18s ease, box-shadow 0.18s ease;
    }

    .cta a:hover {
      transform: translateY(-1px);
      filter: brightness(1.03);
      box-shadow:
        0 22px 60px rgba(207, 46, 46, 0.24),
        0 2px 0 rgba(255, 255, 255, 0.12) inset;
    }

    .cta a:focus-visible {
      outline: 2px solid rgba(207, 46, 46, 0.85);
      outline-offset: 3px;
    }
  </style>
</head>

  <script>
    const categoryLinks = document.querySelectorAll("[data-category]");
    const categories = document.querySelectorAll(".category");

    function showCategory(id) {
      categories.forEach((section) => {
        section.classList.toggle("active", section.id === id);
      });

      const target = document.getElementById(id);
      if (target) {
        target.scrollIntoView({ behavior: "smooth", block: "start" });
      }
    }

    categoryLinks.forEach((link) => {
      link.addEventListener("click", (event) => {
        event.preventDefault();
        showCategory(link.dataset.category);
      });
    });
  </script>
