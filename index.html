<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cotiza con nosotros — Mobiliario de oficina</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&family=Roboto:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      /* Paleta inspirada en mueblesydisenos.com.co (modo oscuro) */
      --bg: #000000;
      --surface: #0f0f0f;
      --ink: #ffffff;
      --muted: #abb8c3;
      --accent: #25D366;
      --line: rgba(255, 255, 255, 0.14);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Roboto", system-ui, sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      line-height: 1.5;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: clamp(2rem, 5vw, 4rem) clamp(1.25rem, 4vw, 2rem) 3rem;
    }

    h1 {
      font-size: clamp(1.75rem, 4vw, 2.25rem);
      font-weight: 600;
      letter-spacing: 0.12em;
      text-align: center;
      text-transform: uppercase;
      color: var(--ink);
      font-family: "Montserrat", system-ui, sans-serif;
      margin-bottom: clamp(2.5rem, 6vw, 4rem);
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: clamp(0.75rem, 2vw, 1.25rem);
      margin-bottom: clamp(3rem, 8vw, 5rem);
    }

    @media (min-width: 720px) {
      .gallery {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .gallery figure {
      position: relative;
      aspect-ratio: 4 / 3;
      overflow: hidden;
      background: var(--surface);
      border: 1px solid var(--line);
    }

    .gallery img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: grayscale(18%) contrast(1.05) brightness(0.88);
      transition: filter 0.4s ease;
    }

    .gallery figure:hover img {
      filter: grayscale(0%) contrast(1.02) brightness(0.98);
    }

    .cta {
      text-align: center;
      padding-top: 0.5rem;
      border-top: 1px solid var(--line);
    }

    .cta a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.9rem 1.75rem;
      font-size: 0.875rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--ink);
      background: var(--accent);
      border: 1px solid var(--accent);
      transition: background 0.2s ease, color 0.2s ease;
    }

    .cta a:hover {
      filter: brightness(0.95);
    }

    .cta a:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>COTIZA CON NOSOTROS</h1>

    <div class="gallery" aria-hidden="true">
      <figure>
        <img
          src="https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=800&q=80"
          alt=""
          loading="lazy"
        />
      </figure>
      <figure>
        <img
          src="https://images.unsplash.com/photo-1524758631624-e2822e304c36?auto=format&fit=crop&w=800&q=80"
          alt=""
          loading="lazy"
        />
      </figure>
      <figure>
        <img
          src="https://images.unsplash.com/photo-1568992687947-868a62a9f521?auto=format&fit=crop&w=800&q=80"
          alt=""
          loading="lazy"
        />
      </figure>
      <figure>
        <img
          src="https://images.unsplash.com/photo-1586023492125-27b2c045efd7?auto=format&fit=crop&w=800&q=80"
          alt=""
          loading="lazy"
        />
      </figure>
      <figure>
        <img
          src="https://images.unsplash.com/photo-1518455027359-f3f8164ba6bd?auto=format&fit=crop&w=800&q=80"
          alt=""
          loading="lazy"
        />
      </figure>
      <figure>
        <img
          src="https://images.unsplash.com/photo-1504384308090-c894fdcc538d?auto=format&fit=crop&w=800&q=80"
          alt=""
          loading="lazy"
        />
      </figure>
    </div>

    <div class="cta">
      <a
        href="https://wa.me/573023601753?text=Estoy%20interesado%20en%20el%20mobiliario"
        target="_blank"
        rel="noopener noreferrer"
      >
        Escribir por WhatsApp
      </a>
    </div>
  </div>
</body>
</html>
