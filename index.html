<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cotiza con nosotros — Mobiliario de oficina</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&family=Roboto:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      /* Paleta inspirada en mueblesydisenos.com.co (modo oscuro) */
      --bg: #000000;
      --surface: #0f0f0f;
      --ink: #ffffff;
      --muted: #abb8c3;
      --accent: #cf2e2e; /* rojo (marca) */
      --line: rgba(255, 255, 255, 0.14);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Roboto", system-ui, sans-serif;
      background:
        radial-gradient(900px circle at 50% -10%, rgba(207, 46, 46, 0.18), transparent 55%),
        radial-gradient(700px circle at 10% 10%, rgba(255, 255, 255, 0.05), transparent 50%),
        var(--bg);
      color: var(--ink);
      min-height: 100vh;
      line-height: 1.5;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: clamp(2rem, 5vw, 4rem) clamp(1.25rem, 4vw, 2rem) 3rem;
    }

    h1 {
      font-size: clamp(2.15rem, 5.2vw, 3.05rem);
      font-weight: 700;
      letter-spacing: 0.09em;
      text-align: center;
      text-transform: uppercase;
      color: transparent;
      font-family: "Montserrat", system-ui, sans-serif;
      background: linear-gradient(90deg, #ffffff 0%, rgba(255, 255, 255, 0.78) 45%, #ffffff 100%);
      -webkit-background-clip: text;
      background-clip: text;
      margin-bottom: clamp(2.5rem, 6vw, 4rem);
      text-shadow: 0 22px 65px rgba(0, 0, 0, 0.6);
    }

    h1::after {
      content: "";
      display: block;
      width: min(520px, 78%);
      height: 2px;
      margin: 1.25rem auto 0;
      background: linear-gradient(90deg, transparent, rgba(207, 46, 46, 0.85), transparent);
      border-radius: 999px;
      box-shadow: 0 0 0 1px rgba(207, 46, 46, 0.12);
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: clamp(0.75rem, 2vw, 1.25rem);
      margin-bottom: clamp(3rem, 8vw, 5rem);
    }

    @media (min-width: 720px) {
      .gallery {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .gallery figure {
      position: relative;
      aspect-ratio: 4 / 3;
      overflow: hidden;
      background: var(--surface);
      border: 1px solid var(--line);
    }

    .gallery img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: grayscale(18%) contrast(1.05) brightness(0.88);
      transition: filter 0.4s ease;
    }

    .gallery figure:hover img {
      filter: grayscale(0%) contrast(1.02) brightness(0.98);
    }

    .cta {
      text-align: center;
      padding-top: 1.25rem;
      border-top: 1px solid var(--line);
    }

    .cta a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 1rem 2.15rem;
      font-size: 0.96rem;
      font-weight: 650;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
      font-family: "Montserrat", system-ui, sans-serif;
      color: #ffffff;
      background: var(--accent);
      border: 1px solid rgba(207, 46, 46, 0.65);
      border-radius: 999px;
      box-shadow:
        0 16px 45px rgba(207, 46, 46, 0.18),
        0 2px 0 rgba(255, 255, 255, 0.08) inset;
      transition: transform 0.18s ease, filter 0.18s ease, box-shadow 0.18s ease;
    }

    .cta a:hover {
      transform: translateY(-1px);
      filter: brightness(1.03);
      box-shadow:
        0 22px 60px rgba(207, 46, 46, 0.24),
        0 2px 0 rgba(255, 255, 255, 0.12) inset;
    }

    .cta a:focus-visible {
      outline: 2px solid rgba(207, 46, 46, 0.85);
      outline-offset: 3px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>COTIZA CON NOSOTROS</h1>

    <div class="gallery" aria-hidden="true">
      <figure>
        <img
          src="https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=800&q=80"
          alt=""
          loading="lazy"
        />
      </figure>
      <figure>
        <img
          src="https://images.unsplash.com/photo-1524758631624-e2822e304c36?auto=format&fit=crop&w=800&q=80"
          alt=""
          loading="lazy"
        />
      </figure>
      <figure>
        <img
          src="https://images.unsplash.com/photo-1568992687947-868a62a9f521?auto=format&fit=crop&w=800&q=80"
          alt=""
          loading="lazy"
        />
      </figure>
      <figure>
        <img
          src="https://images.unsplash.com/photo-1586023492125-27b2c045efd7?auto=format&fit=crop&w=800&q=80"
          alt=""
          loading="lazy"
        />
      </figure>
      <figure>
        <img
          src="https://images.unsplash.com/photo-1518455027359-f3f8164ba6bd?auto=format&fit=crop&w=800&q=80"
          alt=""
          loading="lazy"
        />
      </figure>
      <figure>
        <img
          src="https://images.unsplash.com/photo-1504384308090-c894fdcc538d?auto=format&fit=crop&w=800&q=80"
          alt=""
          loading="lazy"
        />
      </figure>
    </div>

    <div class="cta">
      <a
        href="https://wa.me/573023601753?text=Estoy%20interesado%20en%20el%20mobiliario"
        target="_blank"
        rel="noopener noreferrer"
      >
        Escribir por WhatsApp
      </a>
    </div>
  </div>
</body>
</html>
